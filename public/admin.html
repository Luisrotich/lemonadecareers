<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    /* Admin Dashboard Styling */

/* Reset and Base Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    min-height: 100vh;
    padding: 20px;
    line-height: 1.6;
    color: #333;
}

/* Container */
.container {
    max-width: 1200px;
    margin: 0 auto;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-radius: 30px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    overflow: hidden;
    animation: slideUp 0.6s ease-out;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Admin Header */
.admin-header {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    padding: 2rem;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    overflow: hidden;
}

.admin-header::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
    animation: rotate 20s linear infinite;
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.header-content {
    position: relative;
    z-index: 1;
}

.header-content h1 {
    font-size: 2.2rem;
    margin-bottom: 0.5rem;
    font-weight: 700;
}

.header-content h1 i {
    margin-right: 10px;
    color: #4CAF50;
}

.header-content p {
    font-size: 1rem;
    opacity: 0.9;
}

.back-btn {
    background: rgba(255, 255, 255, 0.1);
    color: white;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 30px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s ease;
    border: 1px solid rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(5px);
    position: relative;
    z-index: 1;
}

.back-btn:hover {
    background: rgba(255, 255, 255, 0.2);
    transform: translateX(-5px);
}

/* Admin Controls */
.admin-controls {
    background: white;
    padding: 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #e2e8f0;
}

.search-box {
    flex: 1;
    min-width: 250px;
    position: relative;
}

.search-box i {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
}

.search-box input {
    width: 100%;
    padding: 12px 15px 12px 45px;
    border: 2px solid #e2e8f0;
    border-radius: 30px;
    font-size: 1rem;
    transition: all 0.3s ease;
}

.search-box input:focus {
    outline: none;
    border-color: #4CAF50;
    box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
}

.filter-section {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
}

.filter-section select {
    padding: 10px 30px 10px 15px;
    border: 2px solid #e2e8f0;
    border-radius: 30px;
    font-size: 0.95rem;
    background: white;
    cursor: pointer;
    transition: all 0.3s ease;
    appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 10px center;
    background-size: 1em;
}

.filter-section select:focus {
    outline: none;
    border-color: #4CAF50;
}

.refresh-btn {
    background: linear-gradient(135deg, #4CAF50, #45a049);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s ease;
}

.refresh-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
}

.refresh-btn i {
    transition: transform 0.5s ease;
}

.refresh-btn:hover i {
    transform: rotate(180deg);
}

/* Stats Cards */
.stats-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1.5rem;
    padding: 2rem;
    background: #f8fafc;
}

.stat-card {
    background: white;
    border-radius: 20px;
    padding: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
    transition: all 0.3s ease;
    animation: fadeIn 0.5s ease-out;
}

.stat-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
}

.stat-icon {
    width: 60px;
    height: 60px;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
}

.stat-icon.pending {
    background: #fff3cd;
    color: #856404;
}

.stat-icon.total {
    background: #d4edda;
    color: #155724;
}

.stat-icon.reviewed {
    background: #cce5ff;
    color: #004085;
}

.stat-info h3 {
    font-size: 1.8rem;
    margin-bottom: 0.2rem;
    color: #1e293b;
}

.stat-info p {
    color: #64748b;
    font-weight: 500;
}

/* Applications Container */
.applications-container {
    padding: 2rem;
}

.applications-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
}

.applications-header h2 {
    color: #1e293b;
    font-size: 1.5rem;
    display: flex;
    align-items: center;
    gap: 10px;
}

.applications-header h2 i {
    color: #4CAF50;
}

.applications-header span {
    background: #e2e8f0;
    padding: 5px 15px;
    border-radius: 30px;
    font-size: 0.9rem;
    color: #475569;
}

/* Applications List */
.applications-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.no-applications {
    text-align: center;
    padding: 4rem 2rem;
    background: #f8fafc;
    border-radius: 20px;
    color: #94a3b8;
}

.no-applications i {
    font-size: 4rem;
    margin-bottom: 1rem;
    opacity: 0.5;
}

.no-applications h3 {
    margin-bottom: 0.5rem;
    color: #64748b;
}

/* Application Card */
.application-card {
    background: white;
    border-radius: 15px;
    padding: 1.5rem;
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    transition: all 0.3s ease;
    border-left: 4px solid transparent;
    animation: slideIn 0.5s ease-out;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateX(-20px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

.application-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
}

.application-card.pending {
    border-left-color: #ffc107;
}

.application-card.reviewed {
    border-left-color: #17a2b8;
}

.application-card.accepted {
    border-left-color: #28a745;
}

.application-card.rejected {
    border-left-color: #dc3545;
}

.applicant-info {
    flex: 2;
    min-width: 250px;
}

.applicant-info h3 {
    color: #1e293b;
    margin-bottom: 0.5rem;
    font-size: 1.2rem;
}

.applicant-info p {
    color: #64748b;
    margin-bottom: 0.3rem;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.9rem;
}

.applicant-info p i {
    width: 16px;
    color: #4CAF50;
}

.application-meta {
    flex: 1;
    min-width: 200px;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 30px;
    font-size: 0.85rem;
    font-weight: 600;
    width: fit-content;
}

.status-badge.pending {
    background: #fff3cd;
    color: #856404;
}

.status-badge.reviewed {
    background: #cce5ff;
    color: #004085;
}

.status-badge.accepted {
    background: #d4edda;
    color: #155724;
}

.status-badge.rejected {
    background: #f8d7da;
    color: #721c24;
}

.date {
    color: #94a3b8;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 5px;
}

.application-actions {
    display: flex;
    gap: 0.5rem;
}

.view-btn {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    color: #475569;
    padding: 8px 15px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 0.9rem;
}

.view-btn:hover {
    background: #e2e8f0;
}

/* Modal Styles */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(5px);
    z-index: 1000;
    animation: fadeIn 0.3s ease;
}

.modal-content {
    position: relative;
    background: white;
    max-width: 600px;
    margin: 50px auto;
    border-radius: 20px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    animation: slideDown 0.4s ease;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-50px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.modal-header {
    padding: 1.5rem;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.modal-header h2 {
    color: #1e293b;
    font-size: 1.5rem;
}

.close-modal {
    background: none;
    border: none;
    font-size: 2rem;
    cursor: pointer;
    color: #94a3b8;
    transition: all 0.3s ease;
}

.close-modal:hover {
    color: #ef4444;
    transform: rotate(90deg);
}

.modal-body {
    padding: 1.5rem;
    max-height: 60vh;
    overflow-y: auto;
}

.modal-footer {
    padding: 1.5rem;
    border-top: 1px solid #e2e8f0;
    display: flex;
    gap: 1rem;
    justify-content: flex-end;
}

.btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s ease;
}

.delete-btn {
    background: #ef4444;
    color: white;
}

.delete-btn:hover {
    background: #dc2626;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
}

.status-btn {
    color: white;
}

.status-btn.pending {
    background: #ffc107;
}

.status-btn.pending:hover {
    background: #e0a800;
}

.status-btn.reviewed {
    background: #17a2b8;
}

.status-btn.reviewed:hover {
    background: #138496;
}

/* Document Modal */
.document-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(5px);
    z-index: 1001;
}

.document-modal-header {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    color: white;
    padding: 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.document-modal-body {
    background: white;
    max-width: 800px;
    margin: 50px auto;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    max-height: 80vh;
    overflow-y: auto;
}

#documentViewer {
    padding: 2rem;
    min-height: 400px;
}

.document-actions-bar {
    display: flex;
    gap: 1rem;
    padding: 1rem 2rem 2rem;
    justify-content: center;
}

.download-btn {
    background: linear-gradient(135deg, #4CAF50, #45a049);
    color: white;
}

.download-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
}

.close-document-modal {
    background: none;
    border: none;
    font-size: 2rem;
    color: white;
    cursor: pointer;
    transition: all 0.3s ease;
}

.close-document-modal:hover {
    transform: rotate(90deg);
    color: #ef4444;
}

/* Footer */
footer {
    text-align: center;
    padding: 1.5rem;
    background: #f8fafc;
    border-top: 1px solid #e2e8f0;
    color: #64748b;
    font-size: 0.9rem;
}

/* Responsive Design */
@media (max-width: 768px) {
    body {
        padding: 10px;
    }
    
    .admin-header {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
        padding: 1.5rem;
    }
    
    .header-content h1 {
        font-size: 1.8rem;
    }
    
    .admin-controls {
        flex-direction: column;
    }
    
    .filter-section {
        width: 100%;
        flex-direction: column;
    }
    
    .stats-cards {
        grid-template-columns: 1fr;
        padding: 1rem;
    }
    
    .application-card {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
    }
    
    .applicant-info p {
        justify-content: center;
    }
    
    .status-badge {
        margin: 0 auto;
    }
    
    .application-actions {
        width: 100%;
        justify-content: center;
    }
    
    .modal-content {
        margin: 20px;
        max-height: 90vh;
    }
    
    .document-modal-body {
        margin: 20px;
    }
    
    .modal-footer {
        flex-wrap: wrap;
    }
    
    .btn {
        flex: 1;
        justify-content: center;
    }
}

@media (max-width: 480px) {
    .header-content h1 {
        font-size: 1.5rem;
    }
    
    .stat-card {
        padding: 1rem;
    }
    
    .stat-icon {
        width: 50px;
        height: 50px;
        font-size: 1.5rem;
    }
    
    .stat-info h3 {
        font-size: 1.5rem;
    }
}

/* Loading Animation */
@keyframes shimmer {
    0% {
        background-position: -1000px 0;
    }
    100% {
        background-position: 1000px 0;
    }
}

.loading {
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 1000px 100%;
    animation: shimmer 2s infinite;
}
</style>
</head>
<body>
    <div class="container">
        <header class="admin-header">
            <div class="header-content">
                <h1><i class="fas fa-tachometer-alt"></i> Admin Dashboard</h1>
                <p>View and manage all applications</p>
            </div>
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Application Form
            </a>
        </header>

        <div class="admin-controls">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search applications...">
            </div>
            
            <div class="filter-section">
                <select id="statusFilter">
                    <option value="all">All Statuses</option>
                    <option value="pending">Pending</option>
                    <option value="reviewed">Reviewed</option>
                    <option value="accepted">Accepted</option>
                    <option value="rejected">Rejected</option>
                </select>
                
                <select id="positionFilter">
                    <option value="all">All Positions</option>
                    <option value="developer">Software Developer</option>
                    <option value="designer">UI/UX Designer</option>
                    <option value="manager">Project Manager</option>
                    <option value="analyst">Business Analyst</option>
                </select>
                
                <button id="refreshBtn" class="refresh-btn">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
        </div>

        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-icon pending">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="stat-info">
                    <h3 id="pendingCount">0</h3>
                    <p>Pending</p>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon total">
                    <i class="fas fa-file-alt"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalCount">0</h3>
                    <p>Total Applications</p>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon reviewed">
                    <i class="fas fa-eye"></i>
                </div>
                <div class="stat-info">
                    <h3 id="reviewedCount">0</h3>
                    <p>Reviewed</p>
                </div>
            </div>
        </div>

        <main>
            <div class="applications-container">
                <div class="applications-header">
                    <h2><i class="fas fa-list"></i> Applications</h2>
                    <span id="applicationsCount">0 applications</span>
                </div>
                
                <div class="applications-list" id="applicationsList">
                    <!-- Applications will be dynamically inserted here -->
                    <div class="no-applications">
                        <i class="fas fa-inbox"></i>
                        <h3>No applications yet</h3>
                        <p>Applications submitted will appear here</p>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>© 2023 Admin Dashboard. Secure access only.</p>
        </footer>
    </div>

    <!-- Application Details Modal -->
    <div id="applicationModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Application Details</h2>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Application details will be inserted here -->
            </div>
            <div class="modal-footer">
                <button class="btn delete-btn">
                    <i class="fas fa-trash"></i> Delete
                </button>
                <button class="btn status-btn pending">
                    <i class="fas fa-clock"></i> Mark as Pending
                </button>
                <button class="btn status-btn reviewed">
                    <i class="fas fa-check"></i> Mark as Reviewed
                </button>
            </div>
        </div>
    </div>

    <!-- Document Viewer Modal -->
<div id="documentModal" class="document-modal">
    <div class="document-modal-header">
        <h2 id="documentModalTitle">Document Viewer</h2>
        <button class="close-document-modal">&times;</button>
    </div>
    <div class="document-modal-body" id="documentViewer">
        <!-- Document content will be displayed here -->
    </div>
    <div class="document-actions-bar">
        <button id="documentDownloadBtn" class="btn download-btn">
            <i class="fas fa-download"></i> Download
        </button>
        <button class="btn close-document-modal">
            <i class="fas fa-times"></i> Close
        </button>
    </div>
        <script src="script.js"></script>

</div>
</body>
</html>
