<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    /* Application Form Styling */

/* Reset and Base Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #fc9700 0%, #6fa24b 100%);
    min-height: 100vh;
    padding: 20px;
    line-height: 1.6;
    color: #333;
}

/* Container */
.container {
    max-width: 800px;
    margin: 0 auto;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-radius: 30px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    overflow: hidden;
    animation: slideUp 0.6s ease-out;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Header */
header {
    background: linear-gradient(135deg, #8d3321, #fdbe00);
    padding: 2.5rem 2rem;
    text-align: center;
    color: white;
    position: relative;
    overflow: hidden;
}

header::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
    animation: rotate 20s linear infinite;
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

header h1 {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
    font-weight: 700;
    position: relative;
    z-index: 1;
}

header h1 i {
    margin-right: 10px;
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

header p {
    font-size: 1.1rem;
    opacity: 0.95;
    position: relative;
    z-index: 1;
}

/* Back Button */
.back-btn {
    position: absolute;
    left: 20px;
    top: 20px;
    background: rgba(255, 255, 255, 0.2);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s ease;
    z-index: 2;
    backdrop-filter: blur(5px);
}

.back-btn:hover {
    background: rgba(255, 255, 255, 0.3);
    transform: translateX(-5px);
}

/* Main Content */
main {
    padding: 2rem;
}

/* Form Card */
.form-card {
    background: white;
    border-radius: 20px;
    padding: 2rem;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
}

/* Form Groups */
.form-group {
    margin-bottom: 1.5rem;
    animation: fadeIn 0.5s ease-out forwards;
    opacity: 0;
}

.form-group:nth-child(1) { animation-delay: 0.1s; }
.form-group:nth-child(2) { animation-delay: 0.2s; }
.form-group:nth-child(3) { animation-delay: 0.3s; }
.form-group:nth-child(4) { animation-delay: 0.4s; }
.form-group:nth-child(5) { animation-delay: 0.5s; }
.form-group:nth-child(6) { animation-delay: 0.6s; }
.form-group:nth-child(7) { animation-delay: 0.7s; }
.form-group:nth-child(8) { animation-delay: 0.8s; }
.form-group:nth-child(9) { animation-delay: 0.9s; }

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.form-group label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 0.5rem;
    font-weight: 600;
    color: #4a5568;
    font-size: 0.95rem;
}

.form-group label i {
    color: #667eea;
    width: 20px;
}

/* Input Fields */
.form-group input[type="text"],
.form-group input[type="email"],
.form-group input[type="tel"],
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 12px 15px;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    font-size: 1rem;
    transition: all 0.3s ease;
    background: #f8fafc;
    font-family: inherit;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    background: white;
}

.form-group textarea {
    resize: vertical;
    min-height: 100px;
}

/* File Input Styling */
.form-group input[type="file"] {
    width: 100%;
    padding: 10px;
    border: 2px dashed #e2e8f0;
    border-radius: 12px;
    background: #f8fafc;
    cursor: pointer;
    transition: all 0.3s ease;
}

.form-group input[type="file"]:hover {
    border-color: #667eea;
    background: #f0f4ff;
}

.form-group input[type="file"]::-webkit-file-upload-button {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    margin-right: 15px;
    transition: all 0.3s ease;
}

.form-group input[type="file"]::-webkit-file-upload-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}

/* File Preview */
.file-preview {
    margin-top: 10px;
    padding: 10px;
    background: #f0f4ff;
    border-radius: 8px;
    font-size: 0.9rem;
    color: #4a5568;
    display: none;
}

.file-preview.active {
    display: block;
    animation: slideDown 0.3s ease;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Form Note */
.form-note {
    background: #fff3cd;
    border: 1px solid #ffeeba;
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #856404;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.8; }
}

.form-note i {
    font-size: 1.2rem;
}

.form-note p {
    font-size: 0.9rem;
    margin: 0;
}

/* Submit Button */
.submit-btn {
    width: 100%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    padding: 1rem;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.submit-btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
}

.submit-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
}

.submit-btn:hover::before {
    width: 300px;
    height: 300px;
}

.submit-btn:active {
    transform: translateY(0);
}

.submit-btn i {
    font-size: 1.1rem;
    transition: transform 0.3s ease;
    z-index: 1;
}

.submit-btn span {
    z-index: 1;
}

.submit-btn:hover i {
    transform: translateX(5px);
}

/* Success Message */
.success-message {
    position: fixed;
    top: 20px;
    right: -400px;
    background: linear-gradient(135deg, #10b981, #059669);
    color: white;
    padding: 1rem 2rem;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
    display: flex;
    align-items: center;
    gap: 15px;
    transition: right 0.5s ease;
    z-index: 1000;
}

.success-message.show {
    right: 20px;
}

.success-message i {
    font-size: 1.5rem;
    animation: scaleUp 0.3s ease;
}

@keyframes scaleUp {
    from { transform: scale(0); }
    to { transform: scale(1); }
}

.success-message p {
    margin: 0;
    font-weight: 500;
}

/* Error Message */
.error-message {
    position: fixed;
    top: 20px;
    right: -400px;
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: white;
    padding: 1rem 2rem;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
    display: flex;
    align-items: center;
    gap: 15px;
    transition: right 0.5s ease;
    z-index: 1000;
}

.error-message.show {
    right: 20px;
}

.error-message i {
    font-size: 1.5rem;
    animation: shake 0.3s ease;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
}

/* Footer */
footer {
    text-align: center;
    padding: 1.5rem;
    background: #f8fafc;
    border-top: 1px solid #e2e8f0;
    color: #64748b;
    font-size: 0.9rem;
}

/* Loading State */
.submit-btn.loading {
    pointer-events: none;
    opacity: 0.7;
}

.submit-btn.loading i {
    animation: spin 1s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* Responsive Design */
@media (max-width: 768px) {
    body {
        padding: 10px;
    }
    
    header h1 {
        font-size: 2rem;
    }
    
    header p {
        font-size: 1rem;
    }
    
    main {
        padding: 1rem;
    }
    
    .form-card {
        padding: 1.5rem;
    }
    
    .success-message,
    .error-message {
        left: 20px;
        right: 20px;
        width: auto;
    }
    
    .success-message.show,
    .error-message.show {
        right: 20px;
        left: 20px;
    }
}

@media (max-width: 480px) {
    header h1 {
        font-size: 1.5rem;
    }
    
    .form-group label {
        font-size: 0.9rem;
    }
    
    .submit-btn {
        padding: 0.8rem;
        font-size: 1rem;
    }
    
    .back-btn {
        left: 10px;
        top: 10px;
        padding: 6px 12px;
        font-size: 0.8rem;
    }
}

/* Custom Select Styling */
select {
    appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 1rem center;
    background-size: 1em;
}

/* Required Field Indicator */
.form-group label::after {
    content: '*';
    color: #ef4444;
    margin-left: 4px;
    display: inline-block;
}

.form-group label[for="coverLetter"]::after,
.form-group label[for="additionalDocs"]::after,
.form-group label[for="message"]::after {
    content: '(optional)';
    color: #121212;
    font-size: 0.85rem;
    font-weight: normal;
    margin-left: 5px;
}

/* Hover Effects */
.form-group:hover label i {
    transform: scale(1.1);
    transition: transform 0.3s ease;
}

/* Focus Within Effects */
.form-group:focus-within label {
    color: #667eea;
}

.form-group:focus-within label i {
    color: #764ba2;
}
</style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-file-signature"></i> Application Form</h1>
            <p>Submit your application with required documents</p>
            
        </header>

        <main>
            <form id="applicationForm" class="form-card" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="fullName"><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>

                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="phone"><i class="fas fa-phone"></i> Phone Number</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>

                <div class="form-group">
                    <label for="position"><i class="fas fa-briefcase"></i> Position Applied For</label>
                    <select id="position" name="position" required>
                        <option value="">Select a position</option>
                        <option value="developer">Software Developer</option>
                        <option value="designer">UI/UX Designer</option>
                        <option value="manager">Project Manager</option>
                        <option value="analyst">Business Analyst</option>
                    </select>
                </div>

                <!-- File Upload Sections -->
                <div class="form-group">
                    <label for="resume"><i class="fas fa-file-pdf"></i> Resume/CV (PDF, DOC, DOCX - Max 5MB)</label>
                    <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx,.txt" required>
                    <div class="file-preview" id="resumePreview"></div>
                </div>

                <div class="form-group">
                    <label for="coverLetter"><i class="fas fa-file-word"></i> Cover Letter (Optional)</label>
                    <input type="file" id="coverLetter" name="coverLetter" accept=".pdf,.doc,.docx,.txt">
                    <div class="file-preview" id="coverLetterPreview"></div>
                </div>

                <div class="form-group">
                    <label for="additionalDocs"><i class="fas fa-folder"></i> Additional Documents (Optional, Max 3 files)</label>
                    <input type="file" id="additionalDocs" name="additionalDocs" multiple accept=".pdf,.doc,.docx,.txt,.jpg,.jpeg,.png">
                    <div class="file-preview" id="additionalDocsPreview"></div>
                </div>

                <div class="form-group">
                    <label for="message"><i class="fas fa-comment"></i> Additional Message</label>
                    <textarea id="message" name="message" rows="4" placeholder="Any additional information..."></textarea>
                </div>

                <div class="form-note">
                    <i class="fas fa-info-circle"></i>
                    <p>Maximum file size per document: 5MB. Supported formats: PDF, DOC, DOCX, TXT, JPG, PNG</p>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fas fa-paper-plane"></i> Submit Application
                </button>
            </form>

            
        </main>

        <footer>
            <p>©2026 Application Portal. All rights reserved.</p>
        </footer>
    </div>

    <div id="successMessage" class="success-message">
        <i class="fas fa-check-circle"></i>
        <p>Application submitted successfully!</p>
    </div>

    <div id="errorMessage" class="error-message">
        <i class="fas fa-exclamation-circle"></i>
        <p id="errorText">Error occurred. Please try again.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
